apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-v2
  labels:
    app: echo
    version: v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo
      version: v2
  template:
    metadata:
      labels:
        app: echo
        version: v2
      annotations:
        # Using the change-cause we discussed earlier
        kubernetes.io/change-cause: "Initial deployment of version one"
    spec:
      containers:
      - name: echo-container
        image: hashicorp/http-echo
        args:
          - "-text=hello from version two"
          - "-listen=:8080"
        ports:
        - containerPort: 8080
